# 财神爷 v2 — CI workflow
#
# Mirrors the lefthook pre-commit gate, plus full test suite + tsc + workspace
# integration. Fails fast on any constitution violation.
#
# Constitution mappings:
#   §1, §13   no ANTHROPIC_API_KEY → audit-no-api-key step
#   §10       no secrets in source → gitleaks step
#   §17       no any/console/dead → biome step
#   §9        vitest unit tests   → test step
#   §15       pre-flight clean     → all steps must pass

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs of the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint + tsc + test + audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so gitleaks can scan past commits, not just HEAD.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ────────────────────────────────────────────────────────────────────
      # Constitution §1 + §13 — no ANTHROPIC_API_KEY anywhere
      # ────────────────────────────────────────────────────────────────────
      - name: Audit no-API-key (constitution §1)
        run: bash scripts/audit-no-api-key.sh

      # ────────────────────────────────────────────────────────────────────
      # Constitution §17 — biome lint (no any, no console, no dead code)
      # ────────────────────────────────────────────────────────────────────
      - name: Biome lint + format check
        run: bun run lint

      # ────────────────────────────────────────────────────────────────────
      # TypeScript type-check across all workspaces
      # ────────────────────────────────────────────────────────────────────
      - name: TypeScript tsc (all workspaces)
        run: bun run tsc

      # ────────────────────────────────────────────────────────────────────
      # Constitution §9 — vitest unit + integration
      # ────────────────────────────────────────────────────────────────────
      - name: Vitest (root + workspaces)
        run: bun run test:run

      # ────────────────────────────────────────────────────────────────────
      # Constitution §10 — gitleaks secret scan (full history)
      # ────────────────────────────────────────────────────────────────────
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use our project-tuned rules (constitution §10).
          GITLEAKS_CONFIG: .gitleaks.toml

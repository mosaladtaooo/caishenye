# MT5 bearer-proxy (FR-009 AC-009-2).
#
# Tailscale Funnel terminates TLS at <hostname>.<tailnet>.ts.net and forwards
# to localhost:8443 (this nginx). nginx validates the Authorization Bearer
# header against MT5_BEARER_TOKEN, then proxies to the operator's local MT5
# REST endpoint on 127.0.0.1:5000.
#
# The bearer is an app-layer secondary defence — Tailscale Funnel itself is
# already public-internet exposed, so the bearer prevents anonymous internet
# scanners from poking the MT5 endpoint.
#
# Per FR-009 AC-009-3: ZERO operator-issued certificates anywhere; Tailscale
# manages the public TLS cert. nginx listens on 127.0.0.1 only — the host's
# firewall blocks all external traffic except Tailscale's own.
#
# Place this at /etc/nginx/conf.d/mt5-bearer.conf and restart nginx.

upstream mt5_local {
    server 127.0.0.1:5000;
    keepalive 8;
}

# Upstream MT5 REST (operator's own daemon).
server {
    listen 127.0.0.1:8443 ssl http2;
    # Tailscale Funnel does its own TLS termination + provides cert files in
    # /var/lib/tailscale/certs. We add cert here only as defence-in-depth so
    # local-only requests still negotiate TLS (avoids shipping plaintext over
    # the loopback adapter on shared-tenant VPS).
    ssl_certificate     /var/lib/tailscale/certs/caishen-vps.crt;
    ssl_certificate_key /var/lib/tailscale/certs/caishen-vps.key;
    ssl_protocols       TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Bearer-proxy logic: lift the env var into nginx via a map, then enforce.
    location / {
        # The map directive (defined globally in nginx.conf) sets
        # $expected_bearer to the value of $MT5_BEARER_TOKEN at config-load
        # time. Reload nginx after rotating the token.
        if ($http_authorization != "Bearer ${MT5_BEARER_TOKEN}") {
            return 401 '{"error":"unauthorized"}';
        }
        add_header Content-Type application/json always;

        proxy_pass http://mt5_local;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # Fail fast — MT5 hiccups should surface as 502, not a 30s hang.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # Health endpoint for Tailscale Funnel's upstream check (no bearer).
    location = /__nginx_alive {
        access_log off;
        return 200 'ok\n';
        add_header Content-Type text/plain;
    }
}
